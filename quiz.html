<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Тестирование знаний" />
    <link rel="icon" href="./icons/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./css/style.min.css" />
    <script defer src="./quiz.js" type="module"></script>
    <title>Тестирование на знания REST API и HTTP</title>
  </head>
  <body>
    <header class="header">
      <a href="./main.html" class="icon-box" rel="noopener noreferrer">
        <span class="material-icons-round"> home </span>
      </a>
      <div class="theme">
        <span class="material-icons-round"></span>
      </div>     
    </header>
    <main class="appContainer quizContainer">      
      <h1 class="h1">Пройдите короткий тест:</h1>
      <section class="quiz">
        <!-- JS RENDER  -->
      </section>
      <section class="output">
        <h3>результаты:</h3>
        <pre><!-- JS RENDER  --></pre>
      </section>
      <!-- Панель контроля -->
      <section class="quizControlBar">
        <button class="btn btn-success finish" title="проверить результаты">
          <div>
            <span class="material-icons-round"> done_all </span>
          </div>
          проверить
        </button>
        <button class="btn btn-danger restart" title="перезапустить">
          <div>
            <span class="material-icons-round"> restart_alt </span>
          </div>
          рестарт
        </button>
      </section>
    </main>
    <footer class="footer">
